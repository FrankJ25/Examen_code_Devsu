webdriver {
  autodownload = true
  driver = chrome

  capabilities {
    acceptInsecureCerts = true

    "goog:chromeOptions" {
      args = [
        "--no-sandbox",
        "--disable-infobars",
        "--disable-notifications",
        "--start-maximized",
        "--disable-dev-shm-usage",
        "--remote-debugging-pipe",
        "--window-size=1920,1080"
      ]
    }
  }
}

drivers {
  chrome {
    webdriver.chrome.driver = auto
  }
}

environment = "DEMOBLAZE"

environments {

  DEMOBLAZE {
    base.url = "https://www.demoblaze.com/"
  }

  SAUCEDEMO {
    base.url = "https://www.saucedemo.com/"
  }

  PETSTORE {
    base.url = "https://petstore.swagger.io/"
  }

  OPENCART {
    base.url = "http://opencart.abstracta.us/"
  }

}