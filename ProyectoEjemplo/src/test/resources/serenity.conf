webdriver {
  autodownload = true
  driver = chrome

  capabilities {
    acceptInsecureCerts = true

    "goog:chromeOptions" {
      args = [
        "--no-sandbox",
        "--disable-infobars",
        "--disable-notifications",
        "--start-maximized",
        "--disable-dev-shm-usage",
        "--remote-debugging-pipe",
        "--window-size=1920,1080",
        "--incognito",
        "--disable-features=PasswordLeakDetection,PasswordCheck,AutofillServerCommunication"
      ]

      prefs = {
        "credentials_enable_service" = false
        "profile.password_manager_enabled" = false
        "profile.password_manager_leak_detection" = false
        "autofill.profile_enabled" = false
        "autofill.credit_card_enabled" = false
      }
    }
  }
}

drivers {
  chrome {
    webdriver.chrome.driver = auto
  }
}

environment = "DEMOBLAZE"

environments {
  SAUCEDEMO {
    base.url = "https://www.saucedemo.com/"
  }

  DEMOBLAZE {
    base.url = "https://www.demoblaze.com/"
  }

  PETSTORE {
    base.url = "https://petstore.swagger.io/"
  }

  OPENCART {
    base.url = "http://opencart.abstracta.us/"
  }
}